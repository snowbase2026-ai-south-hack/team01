services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: caito
      POSTGRES_USER: caito
      POSTGRES_PASSWORD: caito_hack_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caito"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - traefik

  caito:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - OPENROUTER_API_KEY_PROD=${OPENROUTER_API_KEY_PROD}
      - OPENROUTER_API_KEY_TEST=${OPENROUTER_API_KEY_TEST}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-anthropic/claude-sonnet-4}
      - CLOUDRU_API_KEY=${CLOUDRU_API_KEY}
      - CLOUDRU_BASE_URL=${CLOUDRU_BASE_URL:-https://foundation-models.api.cloud.ru/v1}
      - DATABASE_URL=postgresql://caito:caito_hack_2026@postgres:5432/caito
      - PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.caito.rule=PathPrefix(`/`)"
      - "traefik.http.routers.caito.entrypoints=web"
      - "traefik.http.services.caito.loadbalancer.server.port=8000"
    networks:
      - traefik

volumes:
  pgdata:

networks:
  traefik:
    external: true
