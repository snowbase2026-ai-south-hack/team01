services:
  caito:
    build: .
    restart: unless-stopped
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-anthropic/claude-3.5-haiku}
      - PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.caito.rule=PathPrefix(`/`)"
      - "traefik.http.routers.caito.entrypoints=web"
      - "traefik.http.services.caito.loadbalancer.server.port=8000"
    networks:
      - traefik

networks:
  traefik:
    external: true
